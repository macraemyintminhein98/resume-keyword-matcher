<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>APEX Resume Keyword Matcher</title>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
    <style>
        body { font-family: sans-serif; }
    </style>
</head>
<body class="bg-gray-100 flex items-center justify-center min-h-screen">
    <div class="bg-white p-8 rounded-lg shadow-md max-w-lg w-full text-center">
        <h1 class="text-3xl font-bold mb-4">Resume Keyword Matcher</h1>
        <p class="text-gray-600 mb-6">Speed up your job applications. Instantly find missing keywords.</p>
        <button id="checkout-btn" class="bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 px-6 rounded-full text-lg transition duration-300 ease-in-out">
            Get Started Now - $9.99
        </button>
        <p class="mt-4 text-sm text-gray-500">*One-time payment for unlimited use.</p>
    </div>
    <script src="https://js.stripe.com/v3/"></script>
    <script>
        const stripe = Stripe('pk_test_YOUR_STRIPE_PUBLISHABLE_KEY'); // Replace with your actual key
        const checkoutButton = document.getElementById('checkout-btn');

        checkoutButton.addEventListener('click', async () => {
            // In a real app, this would be a server-side call to create a session
            const response = await fetch('/create-checkout-session', { 
                method: 'POST', 
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ priceId: 'price_12345' }) // Replace with your Stripe Price ID
            });
            const session = await response.json();
            const result = await stripe.redirectToCheckout({
                sessionId: session.id,
            });
            if (result.error) {
                alert(result.error.message);
            }
        });
    </script>
</body>
</html>
